<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grile">
<meta name="theme-color" content="#1c1c2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Grile — căutare rapidă</title>
<style>
  :root {
    --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --text2: #6e6e73;
    --accent: #0a84ff; --green: #28a745; --green-bg: #e7f6ec; --green-text: #1d7a35;
    --warn-bg: #fff4e0; --warn-text: #9a6700; --border: #e3e3e8; --chip: #e9e9ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000; --card: #1c1c1e; --text: #f2f2f7; --text2: #98989f;
      --accent: #0a84ff; --green: #30d158; --green-bg: #11331c; --green-text: #6fe394;
      --warn-bg: #33270e; --warn-text: #ffd479; --border: #2c2c2e; --chip: #2c2c2e;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  header { position: sticky; top: 0; z-index: 10; background: var(--bg);
    padding: 10px 14px 8px; border-bottom: 1px solid var(--border); }
  .hrow { display: flex; align-items: center; gap: 8px; }
  h1 { font-size: 19px; margin: 0; flex: 1; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .back { border: none; background: none; color: var(--accent); font-size: 17px; padding: 4px 8px 4px 0; cursor: pointer; flex-shrink: 0; }
  .hidebtn { border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 14px; font-size: 13px; padding: 5px 10px; cursor: pointer; flex-shrink: 0; }
  .hidebtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  #searchwrap { margin-top: 8px; display: none; }
  #searchrow { display: flex; gap: 8px; }
  #search { flex: 1; min-width: 0; font-size: 17px; padding: 10px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }
  #search:focus { border-color: var(--accent); }
  .photobtn { border: 1px solid var(--border); background: var(--card); border-radius: 12px;
    font-size: 20px; padding: 0 13px; cursor: pointer; flex-shrink: 0; }
  .photobtn:active { opacity: .6; }
  .count { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .count em { font-style: normal; color: var(--warn-text); }
  .count .clearphoto { font-style: normal; color: var(--accent); cursor: pointer; }

  main { padding: 12px 14px 40px; }

  .hint { font-size: 13px; color: var(--text2); background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 12px; line-height: 1.45; }

  .catcard { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border); }
  .catcard:active { opacity: .7; }
  .catemoji { font-size: 26px; }
  .catname { font-weight: 600; font-size: 16px; }
  .catn { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .chev { margin-left: auto; color: var(--text2); font-size: 18px; }

  .qcard { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px;
    border: 1px solid var(--border); cursor: pointer; }
  .qcat { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .qcat .pct { color: var(--green-text); font-weight: 700; }
  .qtext { white-space: pre-wrap; word-break: break-word; font-size: 15px; line-height: 1.45; }
  .qtext mark { background: #ffd60a55; color: inherit; border-radius: 3px; padding: 0 1px; }
  .ans { margin-top: 10px; background: var(--green-bg); color: var(--green-text);
    border-radius: 10px; padding: 9px 11px; font-size: 14.5px; white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
  .ans b { margin-right: 4px; }
  .noans { margin-top: 10px; background: var(--warn-bg); color: var(--warn-text);
    border-radius: 10px; padding: 9px 11px; font-size: 14px; }
  .reveal { margin-top: 10px; border: 1px dashed var(--border); color: var(--text2);
    border-radius: 10px; padding: 9px 11px; font-size: 14px; text-align: center; }
  .opts { margin-top: 10px; display: none; }
  .qcard.open .opts { display: block; }
  .opt { display: flex; gap: 8px; padding: 7px 9px; border-radius: 8px; font-size: 14.5px;
    white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
  .opt.ok { background: var(--green-bg); color: var(--green-text); font-weight: 600; }
  .optletter { flex-shrink: 0; font-weight: 600; }
  .expl { margin-top: 8px; font-size: 13.5px; color: var(--text2); white-space: pre-wrap; word-break: break-word;
    border-top: 1px solid var(--border); padding-top: 8px; display: none; }
  .qcard.open .expl { display: block; }
  .more { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--accent); font-size: 16px; cursor: pointer; }
  .empty { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 15px; }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <button class="back" id="back" style="display:none">‹ Înapoi</button>
    <h1 id="title">Grile</h1>
    <button class="hidebtn" id="hidebtn" title="Ascunde răspunsurile până la atingere">🙈 Test</button>
  </div>
  <div id="searchwrap">
    <div id="searchrow">
      <input id="search" type="search" placeholder="Scrie începuturi de cuvinte: ex. «tab uni vec»"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="photobtn" id="photobtn" title="Caută după o poză cu grila">📷</button>
      <input type="file" id="photofile" accept="image/*" hidden>
    </div>
    <div class="count" id="count"></div>
  </div>
</header>
<main id="main"></main>

<script>
const DATA = [{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"În care dintre variantele de mai jos se declară un tablou unidimensional (vector) 𝑥 în care se pot memora cel mult 100 de numere reale?","opts":[{"t":"x=float[100];","ok":false},{"t":"double x[100];","ok":true},{"t":"floating x[100];","ok":false},{"t":"real x(100);","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele expresii logice este adevărată (are o valoare nenulă) dacă şi numai dacă numărul real memorat în variabila 𝑥 nu aparţine intervalului (0,5]?","opts":[{"t":"(x<=0)||(x>5)","ok":true},{"t":"(x<=0)&&(x>5)","ok":false},{"t":"(x<0)||(x>=5)","ok":false},{"t":"(x<=0)&&(x>5)","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele expresii este adevărată (are o valoare nenulă) dacă şi numai dacă numărul întreg memorat în variabila 𝑥 aparţine intervalului (1,6]?","opts":[{"t":"(x>=1)||(x<6)","ok":false},{"t":"(x>1)||(x<=6)","ok":false},{"t":"(x>1)&&(x<6)","ok":false},{"t":"(x>1)&&(x<=6)","ok":true}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"După executarea instrucțiunii float x = 27/5*2/3*7; ce valoare va fi memorată în variabila 𝑥?","opts":[{"t":"25.2","ok":false},{"t":"21.0","ok":true},{"t":"6.3","ok":false},{"t":"7.0","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"După executarea instrucțiunii float x = 55/17*5/8+48/5/8*15; ce valoare va fi memorată în variabila 𝑥?","opts":[{"t":"17.022058","ok":false},{"t":"17.0","ok":false},{"t":"16.0","ok":true},{"t":"21.219914","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Se consideră următoarea secvenţă de instrucțiuni: int t=0,a=1234,b=10; while(a>=b) { a=a-b; t++; } printf(\"%d %d\",t,a); Ce valori vor fi afișate pe ecran după executarea secvenței de mai sus?","opts":[{"t":"124 4","ok":false},{"t":"123 4","ok":true},{"t":"123 5","ok":false},{"t":"124 3","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele secvenţe de instrucţiuni afişează valoarea 654, ştiind că 𝑠 şi 𝑖 sunt două variabile de tip întreg?","opts":[{"t":"s=0;\nfor(i=0;i<=654;i++) s++;\nprintf(\"%d\",s);","ok":false},{"t":"s=651;\nwhile(s<=654) s++;\nprintf(\"%d\",s);","ok":false},{"t":"for(i=1;i<=3;i++) printf(\"%d\",7-i);","ok":true},{"t":"s=7;\nwhile(s>=1) printf(\"%d\",s-1);","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele secvenţe de instrucţiuni afişează valoarea 5432, ştiind că 𝑠 şi 𝑖 sunt două variabile de tip întreg?","opts":[{"t":"s=0;\nfor(i=0;i<=5432;i++) s++;\nprintf(\"%d\",s);","ok":false},{"t":"s=5421;\nwhile(s<=5432) s++;\nprintf(\"%d\",s);","ok":false},{"t":"for(i=1;i<4;i++) printf(\"%d\",6-i);","ok":false},{"t":"s=6;\nwhile(s>=3) printf(\"%d\",--s);","ok":true}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: s=0; while(n>0) { if(n%10>s) s=n%10; else s=10; n=n/10; } printf(\"%d\",s); Ştiind că variabilele 𝑠 şi 𝑛 sunt de tip întreg, ce valoare se va afişa după executarea secvenţei de mai sus pentru 𝑛 = 93321?","opts":[{"t":"9","ok":false},{"t":"10","ok":true},{"t":"15","ok":false},{"t":"1","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele secvenţe de instrucțiuni afişează câtul şi restul împărţirii numărului natural 𝑎 la numărul natural nenul 𝑏?","opts":[{"t":"int t=0;\nwhile(a>=b)\n{\na=a-b;\nt++;\n}\nprintf(\"%d %d\",t,a);","ok":true},{"t":"int t=0;\ndo\n{\na=a-b;\nt++;\n}while(a>=b);\nprintf(\"%d %d\",t,a);","ok":false},{"t":"int t=0;\nwhile(a!=b)\n{\na=a-b;\nt++;\n}\nprintf(\"%d %d\",t,b);","ok":false},{"t":"int t=0;\nwhile(a%b==0)\n{\na=a-b;\nt++;\n}\nprintf(\"%d %d\",t,a);","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următorul program: #include <stdio.h> void sch(int a, int *b) { int aux; aux = a; a = *b; *b = aux; } int main() { int x = 1,y = 2; sch(x,&y); printf(\"%d\",x+y); return 0; } Ce valoare se va afişa pe ecran după executarea programului de mai sus?","opts":[{"t":"2","ok":true},{"t":"1","ok":false},{"t":"4","ok":false},{"t":"3","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următorul program: #include <stdio.h> void sch(char a, char *b) { char aux; aux = a; a = *b; *b = aux; } int main() { char x = '1',y = '2'; sch(x,&y); printf(\"%c,%c\",x,y); return 0; } Ce valori se vor afişa pe ecran după executarea programului de mai sus?","opts":[{"t":"1,2","ok":false},{"t":"2,1","ok":false},{"t":"1,1","ok":true},{"t":"2,2","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următorul program: #include <stdio.h> void sch(int *a, int b) { int aux; aux = *a; *a = b; b = aux; } int main() { int x = 1,y = 2; sch(&x,y); printf(\"%d\",x*y); return 0; } Ce valoare se va afişa pe ecran după executarea programului de mai sus?","opts":[{"t":"3","ok":false},{"t":"2","ok":false},{"t":"4","ok":true},{"t":"1","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următorul program: #include<stdio.h> void f(int a,int *b) { a++; *b=a; (*b)++; } void g(int *a,int b) { b++; *a=b; (*a)++; } int main() { int x=4, y=-2; f(x,&y); g(&x,y); printf(\"%d %d\",x,y); return 0; } Ce valori se vor afişa pe ecran după executarea programului de mai sus?","opts":[{"t":"4 8","ok":false},{"t":"8 8","ok":false},{"t":"8 6","ok":true},{"t":"6 6","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care dintre următoarele secvenţe de instrucţiuni atribuie variabilei de tip întreg 𝑚𝑎𝑥 cea mai mare valoare din tabloul 𝑎, format din 𝑛 numere întregi?","opts":[{"t":"max=0;\nfor(i=0;i<n;i++)\nif(a[i]>max) max=a[i];","ok":false},{"t":"max=a[0];\nfor(i=0;i<n;i++)\nif(a[i]>a[i+1]) max=a[i];","ok":false},{"t":"max=a[0];\nfor(i=0;i<n;i++)\nif(a[i]>max) max=a[i];","ok":true},{"t":"max=0;\nfor(i=0;i<n;i++)\nif(a[i]<a[i+1]) max=a[i+1];","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: np=0; for(i=0;i<n;i++) if(…) np++; printf(\"%d\",np); Cu ce expresie dintre cele de mai jos trebuie înlocuite punctele de suspensie din secvenţa de instrucțiuni dată astfel încât aceasta să afişeze câte valori strict pozitive şi pare sunt în tabloul 𝑎, format din 𝑛 numere întregi?","opts":[{"t":"(a[i]>0)&&(a[i]%2!=0)","ok":false},{"t":"(a[i]>0)&&(a[i]%2==0)","ok":true},{"t":"(a[i]>0)||(a[i]%2!=0)","ok":false},{"t":"(a[i]>=0)||(a[i]%2==0)","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care este valoarea expresiei strlen(\"programare\")+strcmp(\"test\",\"test\")?","opts":[{"t":"10","ok":true},{"t":"14","ok":false},{"t":"18","ok":false},{"t":"\"programaretesttest\"","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: char s[100]; strcpy(s,\"\"); strcat(s,\"abcdefgh\"); strcpy(s+2,s+4); printf(\"%s %d\" ,s,strlen(s)); Ce se va afişa pe ecran după executarea secvenţei date?","opts":[{"t":"adefgh 6","ok":false},{"t":"abefgh 6","ok":true},{"t":"abfgh 5","ok":false},{"t":"abefgh 8","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Care din următoarele expresii de tip logic este adevărată (are o valoare nenulă) dacă şi numai dacă şirul de caractere 𝑠, de lungime 10, este obţinut prin concatenarea a două şiruri identice?","opts":[{"t":"strcmp(s,s+5)==0","ok":false},{"t":"s==strstr(s,s+5)","ok":true},{"t":"s==s+5","ok":false},{"t":"strcmp(s,strcat(s,s+5))==0","ok":false}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: char s[]=\"abcdabcd\",c = 'c'; char *p = strchr(s,c); printf(\"%d\",p - s); Ce se va afişa pe ecran după executarea secvenţei date?","opts":[{"t":"cdabcd","ok":false},{"t":"6","ok":false},{"t":"cd","ok":false},{"t":"2","ok":true}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: char s[20]; strcpy(s,\"abcdabcd\"); strncat(s,s+2,3); strcpy(s,s+4); printf(\"%d\",strlen(s)); Ce se va afişa pe ecran după executarea secvenţei date?","opts":[{"t":"6","ok":false},{"t":"10","ok":false},{"t":"9","ok":false},{"t":"7","ok":true}]},{"cat":"FUNDAMENTELE PROGRAMĂRII","q":"Considerăm următoarea secvenţă de instrucțiuni: char s[2  0; } Stabiliți care dintre următoarele afirmații sunt adevărate:","opts":[{"t":"supraîncărcările operator + () trebuie să fie friend;","ok":true},{"t":"supraîncărcările operator+() nu se justifică deoarece au același cod;","ok":false},{"t":"programul afișează 10;","ok":false},{"t":"supraîncărcările operator+() trebuie să returneze referințe.","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie programul C++: #include<iostream.h> class c1{ int a;}; class c2:public c1{ public: int b; void scrie_a( ) { cout<<a; } }; int main(){ c2 ob; ob.scrie_a(); return 0; } Selectaţi afirmaţia corectă:","opts":[{"t":"funcția scrie_a( ) nu are acces asupra unui membru privat;","ok":true},{"t":"programul afișează valoarea lui a;","ok":false},{"t":"derivarea publică este incorect realizată;","ok":false},{"t":"prin derivare publică, accesul la membrii moşteniţi devine public.","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie programul următor C++: #include<iostream.h> class B{ int x; public: B(int i=10) { x=i;} int get_x() { return x; } }; class D: public B{ public: D(int i):B(i){} D operator+(const D& a) {return x+a.x; } }; int main(){ D ob1(7), ob2(-12); cout<<(ob1+ob2).get_x(); return 0; } Programul afișează:","opts":[{"t":"eroare, clasa B nu poate fi moștenită de clasa D;","ok":false},{"t":"eroare, metoda operator nu are acces la un membru privat al clasei de bază;","ok":true},{"t":"programul afișează valoarea -5;","ok":false},{"t":"eroare, operatorul + nu se poate aplica pentru tipuri abstracte de date.","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class B1{int x;}; class B2{int y;}; class B3{int z;}; class B4{int t;}; class D: public B1, private B2, protected B3,B4 {public : int m;}; int main(){ D d; cout<<d.m; //varianta 1 cout<<d.x; //varianta 2 cout<<d.y; //varianta 3 return 0; } Variantele care permit accesul la variabile pentru afișare sunt:","opts":[{"t":"1+3;","ok":false},{"t":"1+2;","ok":false},{"t":"1+2+3;","ok":false},{"t":"1","ok":true}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Considerăm următorul program C++: class vector{ int * pe, nr_c; public: operator int (){return nr_c;} vector(int); }; vector::vector(int n){ pe=new int[n]; nr_c=n; while(n--) pe[n]=n; } void f(int i){cout<<i<<endl;} int main(){ vector x(10); f(x); return 0; } Programul afişează:","opts":[{"t":"9","ok":false},{"t":"10","ok":true},{"t":"numerele de la 1 la 10","ok":false},{"t":"numerele de la 0 la 9","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Considerăm următorul program C++: class c{ int a; public: virtual void metoda1()=0; virtual void metoda2(int)=0; }; int main{ c *pob; //declaraţia 1 c ob; //declaraţia 2 c *vpob[3]; //declaraţia 3 c vob[3]; //declaraţia 4 return 0; } Declaraţiile admise:","opts":[{"t":"1+2;","ok":false},{"t":"1+2+3+4","ok":false},{"t":"nici una","ok":false},{"t":"1+3;","ok":true}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie data urmatoarea ierarhie de clase C++: class B {… } class D1:B{…} class D2:B{…} class M1:D1, public D2{…} class M2:virtual D1, virtual D2 {…} Considerăm următoarele afirmaţii: 1. clasa M1 va moşteni un obiect de tip B; 2. clasa M1 va moşteni două obiecte de tip B; 3. clasa M2 va va moşteni un obiect de tip B; 4. clasa M2 va moşteni două obiecte de tip B. Precizaţi care dintre afirmaţiile de mai sus sunt corecte:","opts":[{"t":"2+3","ok":true},{"t":"1+2","ok":false},{"t":"1+3","ok":false},{"t":"2+4","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class B{ public: int x; B(int i=16) { x=i; } B f(B ob) { return x+ob.x; } }; class D: public B{ public: D(int i=25) { x=i; } B f(B ob) { return x+ob.x+1; } void afisare(){ cout<<x; } }; int main(){ B *p1=new D, *p2=new B, *p3=new B(p1->f(*p2)); cout<<p3->x; return 0; } Programul afişează:","opts":[{"t":"41","ok":true},{"t":"eroare, nu se poate instanţia un obiect al unei clase derivate printr-un pointer la un obiect\nde tip clasa de bază;","ok":false},{"t":"44","ok":false},{"t":"45","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class B{ int i; public: static int x; B() { x++; i=1; } ~B() { x--; } static int get_x() { return x; } int get_i() { return i; } }; int B::x; class D: public B{ public: D() { x++; } ~D() { x--; } }; int f(B *q){ return (q->get_i())+1;} int main(){ B *p=new B; cout<<f(p); delete p; p=new D; cout<<f(p); delete p; cout<<D::get_x(); return 0; } Programul afişează:","opts":[{"t":"eroare, data membră statică x nu este iniţializată;","ok":false},{"t":"eroare, metoda get_x() nu poate fi declarată static;","ok":false},{"t":"programul afişează valoarea 221;","ok":true},{"t":"programul afişează valoarea 220.","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include <iostream.h> template<class T, class E> float f(T x, E y){ return x+y;} float g(int x, float y){ return x-y;} int main(){ int a=5; float b=8.6; cout<<g(a,b); return 0; } Programul afişează:","opts":[{"t":"3","ok":false},{"t":"eroare, parametrizarea clasei T este incorrect realizată","ok":false},{"t":"13.6","ok":false},{"t":"-3.6","ok":true}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include <iostream.h> template<class T> int f(T x, T y){ return x+y;} int f(int x, int y){ return x-y;} int main(){ int a=5; float b=8.6; cout<<f(a,b); return 0; } Programul afişează:","opts":[{"t":"-3","ok":true},{"t":"eroare, parametrizarea clasei T este incorrect realizată","ok":false},{"t":"13.6","ok":false},{"t":"3.6","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class B{ int x; public: B(int i=10) { x=i; } int get_x() { return x; }}; class D: public B{ public: D(int i):B(i) {} D operator+(const D& a) {return x+a.x; }}; int main() { D ob1(7), ob2(-12); cout<<(ob1+ob2).get_x(); return 0; } Indicați ce se va afișa pe ecran în urma executării programului:","opts":[{"t":"-5","ok":false},{"t":"-4","ok":false},{"t":"eroare, în clasa derivată D nu se poate accesa data membră privată x a clasei B","ok":true},{"t":"-3","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class B{ public: int x; B(int i=16) { x=i; } B f(B ob) { return x+ob.x; } }; class D: public B{ public: D(int i=25) { x=i; } B f(B ob) { return x+ob.x+1; } void afisare(){ cout<<x; } }; int main() { B *p1=new D, *p2=new B, *p3=new B(p1->f(*p2)); cout<<p3->x; return 0; } Programul afişează:","opts":[{"t":"41","ok":true},{"t":"eroare, în clasa derivată D nu se poate accesa data membră x a clasei B","ok":false},{"t":"16","ok":false},{"t":"25","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"Fie următorul program C++: #include<iostream.h> class cls1{ public: int a; cls1() { a=7; } }; class cls2{ public: int b; cls2(int i) { b=i; } cls2(cls1& x) { b=x.a; } }; int main(){ cls1 x; cout<<x.a; cls2 y(x); cout<<y.b; return 0; } Programul afişează:","opts":[{"t":"7 7","ok":true},{"t":"eroare, constructorul de copiere nu este corect definit","ok":false},{"t":"eroare, constructorul de copiere nu poate accesa o dată publică a clasei cls1","ok":false},{"t":"78","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"O funcţie friend diferă de o metodă obişnuită a unei clase prin faptul că:","opts":[{"t":"nu se poate defini inline;","ok":false},{"t":"nu primeşte pointerul implicit la obiect this;","ok":true},{"t":"nu poate accesa decât partea publică a obiectului;","ok":false},{"t":"se foloseşte doar pentru supraîncărcarea operatorilor;","ok":false}]},{"cat":"PROGRAMARE ORIENTATĂ PE OBIECTE (C++)","q":"O funcţie independentă declarată friend în domeniul private dintr-o clasă şi care primeşte ca parametru o referinţă la un obiect al clasei respective are acces:","opts":[{"t":"doar  /etc/hostname conține numele gazdei pentru sistemul local. Pentru a-l aplica, poate fi necesară rularea comenzii hostnamectl set-hostname."},{"cat":"SISTEME DE OPERARE","q":"Cum afișezi spațiul liber pe disc într-un sistem Linux?","opts":[{"t":"df -h","ok":true},{"t":"du -sh","ok":false},{"t":"lsblk","ok":false},{"t":"free -m","ok":false}],"expl":"Comanda df -h afișează utilizarea spațiului pe disc în format ușor de citit (human-readable)."},{"cat":"SISTEME DE OPERARE","q":"Cum adaugi un utilizator în Linux?","opts":[{"t":"useradd username","ok":false},{"t":"adduser username","ok":false},{"t":"sudo useradd username","ok":false},{"t":"toate cele de mai sus","ok":true}],"expl":"useradd și adduser pot fi utilizate pentru a adăuga utilizatori. sudo este necesar dacă nu ești root."},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda echo \"export PATH=/usr/local/bin:\\$PATH\" >> ~/.bashrc?","opts":[{"t":"Adaugă /usr/local/bin la variabila PATH pentru sesiunea curentă.","ok":false},{"t":"Modifică permanent variabila PATH pentru utilizatorul curent.","ok":true},{"t":"Resetează PATH la valoarea implicită.","ok":false},{"t":"Afișează valoarea curentă a variabilei PATH.","ok":false}],"expl":"Comanda adaugă o nouă cale la variabila PATH în fișierul ~/.bashrc, care este citit la fiecare inițializare a shell-ului."},{"cat":"SISTEME DE OPERARE","q":"Cum setezi permisiunea de executare pentru toate fișierele dintr-un director?","opts":[{"t":"chmod +x *","ok":false},{"t":"chmod -R +x .","ok":false},{"t":"chmod u+x *","ok":false},{"t":"find . -type f -exec chmod +x {} \\;","ok":true}],"expl":"Comanda caută recursiv (find . -type f) toate fișierele din director și aplică permisiunea de executare folosind chmod +x. Celelalte variante fie nu aplică recursiv permisiunile, fie modifică doar anumite fișiere."},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda grep -rl \"text\" /var/log?","opts":[{"t":"Afișează liniile care conțin \"text\" din fișierele din /var/log.","ok":false},{"t":"Caută ],"expl":"-c: Creează o arhivă. -z: Comprimă cu gzip. -f: Specifică numele fișierului arhivă."},{"cat":"SISTEME DE OPERARE","q":"Care este comanda pentru a afișa tabela de rutare?","opts":[{"t":"route","ok":false},{"t":"ip route","ok":false},{"t":"netstat -r","ok":false},{"t":"toate cele de mai sus","ok":true}],"expl":"route și ip route afișează tabela de rutare. netstat -r este o alternativă mai veche pentru a vizualiza rutele de rețea."},{"cat":"SISTEME DE OPERARE","q":"Cum adaugi un cron job care să ruleze zilnic la ora 12:00?","opts":[{"t":"0 12 * * * /cale/comanda.sh","ok":true},{"t":"12 0 * * * /cale/comanda.sh","ok":false},{"t":"0 0 12 * * /cale/comanda.sh","ok":false},{"t":"* * 12 * * /cale/comanda.sh","ok":false}],"expl":"Formatul crontab este: minut oră zi lună zi-a-săptămânii comanda"},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda sed 's/Linux/UNIX/g' file.txt?","opts":[{"t":"Înlocuiește primul cuvânt \"Linux\" din fiecare linie cu \"UNIX\".","ok":false},{"t":"Înlocuiește toate instanțele de \"Linux\" cu \"UNIX\" în fișierul file.txt.","ok":true},{"t":"Afișează conținutul fișierului file.txt fără modificări.","ok":false},{"t":"Șterge toate liniile care conțin \"Linux\".","ok":false}],"expl":"s: Substituire. /g: Înlocuire globală în fiecare linie."},{"cat":"SISTEME DE OPERARE","q":"Cum compilezi un program C folosind mai multe fișiere sursă?","opts":[{"t":"gcc -o program file1.c file2.c","ok":true},{"t":"gcc -c file1.c file2.c","ok":false},{"t":"gcc -shared file1.c file2.c -o program","ok":false},{"t":"make file1.c file2.c","ok":false}],"expl":"gcc -o program: Creează un executabil numit program. Specificarea mai multor fișiere sursă permite legarea lor împreună."},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda ping -c 4 google.com?","opts":[{"t":"Ping continuu către google.com.","ok":false},{"t":"Trimite 4 pachete ICMP către google.com.","ok":true},{"t":"Verifică dacă portul 4 este deschis pe google.com.","ok":false},{"t":"Testează viteza conexiunii ă toate fișierele .txt într-un nou director.","ok":false},{"t":"Renumește toate fișierele .txt în .bak.","ok":true},{"t":"Șterge toate fișierele .txt.","ok":false},{"t":"Afișează doar fișierele .txt.","ok":false}],"expl":"${file%.txt} elimină extensia .txt. .bak este adăugată la final."},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda read -p \"Introdu numele: \" nume?","opts":[{"t":"Afișează \"Introdu numele: \" și salvează răspunsul în variabila nume.","ok":true},{"t":"Scrie \"Introdu numele: \" într-un fișier numit nume.","ok":false},{"t":"Afișează conținutul fișierului nume.","ok":false},{"t":"Caută numele în variabilele de mediu.","ok":false}],"expl":"Opțiunea -p de la read afișează un mesaj de prompt."},{"cat":"SISTEME DE OPERARE","q":"Ce face următorul script? if [[ $1 -gt 10 ]]; then echo \"Mai mare decât 10\" else echo \"Mai mic sau egal cu 10\" fi","opts":[{"t":"Compară dacă $1 este mai mare decât 10.","ok":true},{"t":"Compară dacă $1 este egal cu 10.","ok":false},{"t":"Afișează un mesaj de eroare.","ok":false},{"t":"Este un script care verifică doar fișiere.","ok":false}],"expl":"-gt: Operator pentru \"greater than\" (mai mare decât)."},{"cat":"SISTEME DE OPERARE","q":"Cum verifici dacă un fișier există într-un script Bash?","opts":[{"t":"[ -e fișier ]","ok":false},{"t":"[ -f fișier ]","ok":false},{"t":"[ -d fișier ]","ok":false},{"t":"a) și b)","ok":true}],"expl":"-e: Verifică dacă fișierul sau directorul există. -f: Verifică doar dacă este fișier obișnuit (nu director)."},{"cat":"SISTEME DE OPERARE","q":"Ce face comanda while true; do echo \"Rulez\"; done?","opts":[{"t":"Afișează \"Rulez\" o singură dată.","ok":false},{"t":"Rulează un ciclu infinit care afișează \"Rulez\".","ok":true},{"t":"Nu face nimic.","ok":false},{"t":"Închide terminalul.","ok":false}],"expl":"while true definește un ciclu infinit. Pentru a-l opri, se utilizează Ctrl+C."},{"cat":"SISTEME DE OPERARE","q":"Cum execuți un script și redirecționezi atât ieșirea standard, cât și erorile unt","ok":false}],"expl":"Comanda df afișează spațiul utilizat și disponibil pentru fiecare partiție. Opțiunea -h face ca ieșirea să fie în format ușor de citit (GB, MB)."},{"cat":"SISTEME DE OPERARE","q":"Ce face următorul script? #!/bin/bash for i in {1..3}; do echo \"Linia $i\" done","opts":[{"t":"Afișează doar \"Linia 1\".","ok":false},{"t":"Rulează un ciclu infinit.","ok":false},{"t":"Afișează \"Linia 1\", \"Linia 2\" și \"Linia 3\".","ok":true},{"t":"Nu face nimic, deoarece sintaxa este greșită.","ok":false}],"expl":"Ciclul for iterează de 3 ori, iar echo afișează textul pentru fiecare valoare."},{"cat":"SISTEME DE OPERARE","q":"Cum verifici ce utilizatori sunt conectați în prezent?","opts":[{"t":"who","ok":false},{"t":"w","ok":false},{"t":"users","ok":false},{"t":"toate cele de mai sus","ok":true}],"expl":"who: Listează utilizatorii conectați. w: Afișează utilizatorii conectați și procesele lor. users: Listează utilizatorii conectați, într-un format simplificat."},{"cat":"SISTEME DE OPERARE","q":"Cum verifici ce pachete sunt instalate pe un sistem bazat pe Debian?","opts":[{"t":"rpm -qa","ok":false},{"t":"dpkg --get-selections","ok":false},{"t":"apt list --installed","ok":false},{"t":"b) și c)","ok":true}],"expl":"dpkg --get-selections: Listează toate pachetele instalate. apt list --installed: Oferă o listă detaliată a pachetelor instalate."},{"cat":"SISTEME DE OPERARE","q":"Cum afișezi procesele care utilizează cel mai mult CPU pe un sistem Linux?","opts":[{"t":"top","ok":false},{"t":"ps aux --sort=-%cpu","ok":false},{"t":"htop","ok":false},{"t":"toate cele de mai sus","ok":true}],"expl":"top și htop afișează procesele în timp real. ps aux --sort=-%cpu listează procesele sortate după utilizarea CPU."},{"cat":"SISTEME DE OPERARE","q":"Cum verifici permisiunile unui fișier?","opts":[{"t":"ls -l","ok":false},{"t":"chmod file","ok":false},{"t":"stat file","ok":false},{"t":"a) și c)","ok":true}],"expl":"ls -l: Afișează permisiunile în format simbolic. stat file: // ---------- normalizare pentru căutare (diacritice, litere matematice) ----------
function norm(s) {
  return s.normalize("NFKC").toLowerCase().normalize("NFD")
    .replace(/[̀-ͯ]/g, "")
    .replace(/\s+/g, " ");
}
DATA.forEach(q => {
  q._q = norm(q.q);
  q._all = q._q + " " + q.opts.map(o => norm(o.t)).join(" ");
  q._qtoks = [...new Set(q._q.split(/[^a-z0-9]+/).filter(Boolean))];
  q._atoks = [...new Set(q._all.split(/[^a-z0-9]+/).filter(Boolean))];
  q._atokset = new Set(q._atoks);
});

// ---------- căutare cu potrivire pe prefixe de cuvinte + scor de relevanță ----------
function termScore(item, t) {
  for (const w of item._qtoks) if (w.startsWith(t)) return 4;
  if (item._q.includes(t)) return 3;
  for (const w of item._atoks) if (w.startsWith(t)) return 2;
  if (item._all.includes(t)) return 1;
  return 0;
}

// distanță de editare ≤ 1 (o literă greșită, lipsă sau în plus)
function ed1(a, b) {
  if (a === b) return true;
  const la = a.length, lb = b.length;
  if (Math.abs(la - lb) > 1) return false;
  let i = 0, j = 0, edits = 0;
  while (i < la && j < lb) {
    if (a[i] === b[j]) { i++; j++; continue; }
    if (++edits > 1) return false;
    if (la > lb) i++;
    else if (la < lb) j++;
    else { i++; j++; }
  }
  return edits + (la - i) + (lb - j) <= 1;
}
function fuzzyTerm(item, t) {
  for (const w of item._atoks) {
    if (w.length + 1 >= t.length && (ed1(w.slice(0, t.length), t) || ed1(w.slice(0, t.length + 1), t))) return true;
  }
  return false;
}

function getPool() {
  if (curCat === "__recent") return getRecents().map(i => DATA[i]);
  if (curCat) return DATA.filter(x => x.cat === curCat);
  return DATA;
}

function getMatches() {
  if (photoMode) return photoMode.results;
  const qn = norm(search.value.trim());
  const pool = getPool();
  lastFuzzy = false;
  if (!qn) return pool;
  const terms = qn.split(" ").filter(Boolean);
  const scored = [];
  for (const item of pool) {
    let sc = 0, ok = true;
    for (const t of terms) {
      const s = termScore(item, t);
      if (!s) { ok = false; break; }
      sc += s;
    }
    if (ok) scored.push([sc, item]);
  }
  if (!scored.length && terms.some(t => t.length >= 4)) {
    for (const item of pool) {
      let ok = true;
      for (const t of terms) {
        if (!termScore(item, t) && !(t.length >= 4 && fuzzyTerm(item, t))) { ok = false; break; }
      }
      if (ok) scored.push([1, item]);
    }
    if (scored.length) lastFuzzy = true;
  }
  scored.sort((a, b) => b[0] - a[0]);
  return scored.map(x => x[1]);
}

// ---------- căutare după poză (OCR cu Tesseract) ----------
let ocrWorker = null, DF = null;

function buildDF() {
  DF = new Map();
  for (const q of DATA) for (const t of q._atoks) DF.set(t, (DF.get(t) || 0) + 1);
}

function loadScript(src) {
  return new Promise((ok, err) => {
    const s = document.createElement("script");
    s.src = src; s.onload = ok;
    s.onerror = () => err(new Error("Nu am putut descărca " + src));
    document.head.appendChild(s);
  });
}

async function fileToCanvas(file, maxDim) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  await new Promise((ok, err) => { img.onload = ok; img.onerror = err; img.src = url; });
  const sc = Math.min(1, maxDim / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * sc); c.height = Math.round(img.height * sc);
  c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
  URL.revokeObjectURL(url);
  return c;
}

async function handlePhoto(file) {
  try {
    count.innerHTML = "📷 Pregătesc modulul de citire… (prima dată e nevoie de internet)";
    if (!window.Tesseract) {
      await loadScript("https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js");
    }
    if (!ocrWorker) {
      ocrWorker = await Tesseract.createWorker("ron", 1, {
        logger: m => {
          if (m.status === "recognizing text") {
            count.innerHTML = "📷 Citesc poza… " + Math.round(m.progress * 100) + "%";
          }
        }
      });
    }
    count.innerHTML = "📷 Citesc poza… 0%";
    const canvas = await fileToCanvas(file, 1800);
    const { data } = await ocrWorker.recognize(canvas);
    photoSearch(data.text || "");
  } catch (e) {
    count.innerHTML = "<em>⚠️ Nu am putut citi poza. Verifică conexiunea la internet (necesară la prima utilizare) și încearcă din nou.</em>";
  }
}

function photoSearch(text) {
  if (!DF) buildDF();
  const toks = [...new Set(norm(text).split(/[^a-z0-9]+/).filter(t => t.length >= 3))].slice(0, 60);
  if (toks.length < 2) {
    count.innerHTML = "<em>⚠️ Nu am putut distinge text în poză. Încearcă o poză mai clară, decupată pe întrebare.</em>";
    return;
  }
  const N = DATA.length;
  const weights = toks.map(t => {
    const df = DF.get(t) || 0;
    if (df > 0) return df > N * 0.3 ? 0 : Math.log(N / (1 + df));
    return t.length >= 5 ? Math.log(N / 5) : 0; // posibil cuvânt citit greșit — îl păstrăm pentru potrivire aproximativă
  });
  const totalW = weights.reduce((a, b) => a + b, 0);
  if (!totalW) {
    count.innerHTML = "<em>⚠️ Textul din poză nu seamănă cu nicio grilă.</em>";
    return;
  }
  const pool = getPool();
  // pasul 1: potrivire exactă pe cuvinte
  const prelim = [];
  for (const item of pool) {
    let s = 0;
    for (let k = 0; k < toks.length; k++) {
      if (weights[k] && item._atokset.has(toks[k])) s += weights[k];
    }
    prelim.push([s, item]);
  }
  prelim.sort((a, b) => b[0] - a[0]);
  // pasul 2: rafinare cu toleranță la erori OCR, doar pe primele 30
  const top = prelim.slice(0, 30).map(([s0, item]) => {
    let s = 0;
    for (let k = 0; k < toks.length; k++) {
      const t = toks[k], w = weights[k];
      if (!w) continue;
      if (item._atokset.has(t)) { s += w; continue; }
      if (t.length >= 5) {
        for (const wd of item._atoks) if (ed1(wd, t)) { s += 0.7 * w; break; }
      }
    }
    return [s / totalW, item];
  });
  top.sort((a, b) => b[0] - a[0]);
  const results = top.filter(([r]) => r >= 0.18).slice(0, 10);
  if (!results.length) {
    count.innerHTML = "<em>⚠️ Nicio grilă suficient de asemănătoare. Încearcă o poză mai clară sau caută manual câteva cuvinte.</em>";
    return;
  }
  const matchedToks = toks.filter((t, k) => weights[k] && DF.get(t));
  photoMode = {
    results: results.map(([, item]) => item),
    scores: new Map(results.map(([r, item]) => [item, Math.min(99, Math.round(r * 100))])),
    qstr: matchedToks.join(" ")
  };
  shown = 40;
  renderList();
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function highlight(text, query) {
  const q = norm(query.trim());
  if (!q) return esc(text);
  const terms = q.split(" ").filter(t => t.length >= 2);
  if (!terms.length) return esc(text);
  const orig = text;
  const normChars = [];
  const map = [];
  for (let i = 0; i < orig.length; i++) {
    const n = norm(orig[i]);
    for (const c of n) { normChars.push(c); map.push(i); }
  }
  const nstr = normChars.join("");
  const ranges = [];
  for (const t of terms) {
    let from = 0, idx;
    while ((idx = nstr.indexOf(t, from)) !== -1 && ranges.length < 50) {
      ranges.push([map[idx], map[Math.min(idx + t.length - 1, map.length - 1)] + 1]);
      from = idx + t.length;
    }
  }
  if (!ranges.length) return esc(orig);
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (const r of ranges.slice(1)) {
    const last = merged[merged.length - 1];
    if (r[0] <= last[1]) last[1] = Math.max(last[1], r[1]); else merged.push(r);
  }
  let out = "", pos = 0;
  for (const [a, b] of merged) {
    out += esc(orig.slice(pos, a)) + "<mark>" + esc(orig.slice(a, b)) + "</mark>";
    pos = b;
  }
  return out + esc(orig.slice(pos));
}

function renderList() {
  const matches = getMatches();
  const q = photoMode ? photoMode.qstr : search.value;
  if (photoMode) {
    count.innerHTML = "📷 " + matches.length + (matches.length === 1 ? " potrivire probabilă" : " potriviri probabile")
      + " — <span class='clearphoto' id='clearphoto'>renunță ✕</span>";
  } else {
    count.innerHTML = matches.length
      ? matches.length + (matches.length === 1 ? " grilă găsită" : " grile găsite")
        + (lastFuzzy ? " <em>(potrivire aproximativă)</em>" : "")
      : "";
  }
  const cp = $("clearphoto");
  if (cp) cp.onclick = () => { photoMode = null; renderList(); };
  if (!matches.length) {
    main.innerHTML = `<div class="empty">Nicio grilă găsită.<br>Încearcă mai puține cuvinte sau alte fragmente.</div>`;
    return;
  }
  let h = "";
  matches.slice(0, shown).forEach((item, i) => {
    const idx = DATA.indexOf(item);
    const correct = item.opts.map((o, j) => ({ ...o, j })).filter(o => o.ok);
    let ansHtml;
    if (!correct.length) {
      ansHtml = `<div class="noans">⚠️ Răspunsul nu este marcat în document</div>`;
    } else if (hideMode) {
      ansHtml = `<div class="reveal" data-reveal="${idx}">👆 Atinge pentru a vedea răspunsul</div>`;
    } else {
      ansHtml = correct.map(o =>
        `<div class="ans"><b>✓ ${LETTERS[o.j]})</b>${esc(o.t)}</div>`).join("");
    }
    const optsHtml = item.opts.map((o, j) =>
      `<div class="opt${o.ok ? " ok" : ""}"><span class="optletter">${o.ok ? "✓" : ""} ${LETTERS[j]})</span><span>${esc(o.t)}</span></div>`).join("");
    const autoOpen = matches.length === 1 && !hideMode;
    const pct = photoMode ? photoMode.scores.get(item) : null;
    const catLine = (pct !== null && pct !== undefined ? `<span class="pct">≈${pct}% · </span>` : "")
      + (curCat && curCat !== "__recent" ? "" : esc(item.cat));
    h += `<div class="qcard${autoOpen ? " open" : ""}" data-i="${idx}">
      ${catLine ? `<div class="qcat">${catLine}</div>` : ""}
      <div class="qtext">${highlight(item.q, q)}</div>
      <span class="ansbox">${ansHtml}</span>
      <div class="opts">${optsHtml}</div>
      ${item.expl ? `<div class="expl">${esc(item.expl)}</div>` : ""}
    </div>`;
  });
  if (matches.length > shown) {
    h += `<button class="more" id="more">Arată mai multe (${matches.length - shown})</button>`;
  }
  main.innerHTML = h;
  main.querySelectorAll(".qcard").forEach(el => {
    el.onclick = ev => {
      saveRecent(+el.dataset.i);
      const rv = ev.target.closest("[data-reveal]");
      if (rv) {
        const item = DATA[+rv.dataset.reveal];
        const correct = item.opts.map((o, j) => ({ ...o, j })).filter(o => o.ok);
        rv.outerHTML = correct.map(o =>
          `<div class="ans"><b>✓ ${LETTERS[o.j]})</b>${esc(o.t)}</div>`).join("");
        return;
      }
      el.classList.toggle("open");
    };
  });
  const more = $("more");
  if (more) more.onclick = () => { shown += 40; renderList(); };
}

renderHome();
</script>
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
